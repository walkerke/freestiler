name: Python Package

on:
  pull_request:
    paths:
      - ".github/workflows/python-package.yml"
      - "python/**"
      - "src/rust/freestiler-core/**"
  push:
    branches:
      - main
    tags:
      - "python-v*"
    paths:
      - ".github/workflows/python-package.yml"
      - "python/**"
      - "src/rust/freestiler-core/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build Wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
          - os: ubuntu-latest
            python-version: "3.10"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
          - os: ubuntu-latest
            python-version: "3.11"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
          - os: ubuntu-latest
            python-version: "3.12"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
          - os: windows-latest
            python-version: "3.9"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: windows-latest
            python-version: "3.10"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: windows-latest
            python-version: "3.11"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: windows-latest
            python-version: "3.12"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: macos-14
            python-version: "3.9"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: macos-14
            python-version: "3.10"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: macos-14
            python-version: "3.11"
            manylinux: "auto"
            duckdb_explicit_platform: ""
          - os: macos-14
            python-version: "3.12"
            manylinux: "auto"
            duckdb_explicit_platform: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        env:
          DUCKDB_EXPLICIT_PLATFORM: ${{ matrix.duckdb_explicit_platform }}
        with:
          command: build
          args: --manifest-path python/Cargo.toml --release --out dist
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path python/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/freestiler
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
