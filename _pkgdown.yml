url: https://walker-data.com/freestiler/
template:
  bootstrap: 5
  bslib:
    bg: "#f9f7f3"
    fg: "#2b4a2b"
    primary: "#355e3b"
    secondary: "#6b8e6b"
    link-color: "#2e8cb8"
    code-color: "#355e3b"

home:
  title: freestiler
  description: Rust-powered vector tile engine for R and Python

navbar:
  bg: "#2b4a2b"
  type: dark
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Getting Started
        href: articles/getting-started.html
      - text: Mapping with mapgl
        href: articles/mapping.html
      - text: "---"
      - text: MapLibre Tiles (MLT)
        href: articles/maplibre-tiles.html
      - text: Python Setup
        href: articles/python.html

reference:
- title: Tile Generation
  desc: Create PMTiles archives from spatial data
  contents:
  - freestile
  - freestile_file
  - freestile_query
  - freestile_layer

- title: Viewing Tiles
  desc: Serve and view PMTiles locally
  contents:
  - serve_tiles
  - stop_server
  - view_tiles

- title: internal
  contents:
  - starts_with("rust_")

articles:
- title: Getting Started
  navbar: ~
  contents:
  - getting-started

- title: Mapping
  navbar: ~
  contents:
  - mapping

- title: Technical Details
  navbar: ~
  contents:
  - maplibre-tiles

- title: Python Setup
  navbar: ~
